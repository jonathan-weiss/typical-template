# ============================================================================
# COMMENT STYLES DEFINITION
# Format:
# commentStyle.IDENTIFIER.startOfComment=<how the comment start>
# commentStyle.IDENTIFIER.endOfComment=<how the comment end, can be empty (for line comments)>
# commentStyle.IDENTIFIER.commentType=<LINE_COMMENT|BLOCK_COMMENT>
# ============================================================================

# Line Comments
commentStyle.DOUBLE_SLASH.startOfComment=//
commentStyle.DOUBLE_SLASH.endOfComment=
commentStyle.DOUBLE_SLASH.commentType=LINE_COMMENT

commentStyle.HASH.startOfComment=#
commentStyle.HASH.endOfComment=
commentStyle.HASH.commentType=LINE_COMMENT

commentStyle.DOUBLE_DASH.startOfComment=--
commentStyle.DOUBLE_DASH.endOfComment=
commentStyle.DOUBLE_DASH.commentType=LINE_COMMENT

commentStyle.SEMICOLON.startOfComment=;
commentStyle.SEMICOLON.endOfComment=
commentStyle.SEMICOLON.commentType=LINE_COMMENT

commentStyle.SINGLE_QUOTE.startOfComment='
commentStyle.SINGLE_QUOTE.endOfComment=
commentStyle.SINGLE_QUOTE.commentType=LINE_COMMENT

commentStyle.PERCENT.startOfComment=%
commentStyle.PERCENT.endOfComment=
commentStyle.PERCENT.commentType=LINE_COMMENT

commentStyle.PIPE.startOfComment=|
commentStyle.PIPE.endOfComment=
commentStyle.PIPE.commentType=LINE_COMMENT

commentStyle.COLON.startOfComment=:
commentStyle.COLON.endOfComment=
commentStyle.COLON.commentType=LINE_COMMENT

commentStyle.REM_KEYWORD.startOfComment=REM
commentStyle.REM_KEYWORD.endOfComment=
commentStyle.REM_KEYWORD.commentType=LINE_COMMENT

commentStyle.COLUMN_C.startOfComment=C
commentStyle.COLUMN_C.endOfComment=
commentStyle.COLUMN_C.commentType=LINE_COMMENT

commentStyle.COLUMN_ASTERISK.startOfComment=*
commentStyle.COLUMN_ASTERISK.endOfComment=
commentStyle.COLUMN_ASTERISK.commentType=LINE_COMMENT

commentStyle.HASH_BANG.startOfComment=#!
commentStyle.HASH_BANG.endOfComment=
commentStyle.HASH_BANG.commentType=LINE_COMMENT

commentStyle.TRIPLE_SLASH.startOfComment=///
commentStyle.TRIPLE_SLASH.endOfComment=
commentStyle.TRIPLE_SLASH.commentType=LINE_COMMENT

commentStyle.DOUBLE_SLASH_BANG.startOfComment=//!
commentStyle.DOUBLE_SLASH_BANG.endOfComment=
commentStyle.DOUBLE_SLASH_BANG.commentType=LINE_COMMENT

# Exclamation mark - Fortran 90+ free-form, Java .properties files
commentStyle.EXCLAMATION.startOfComment=!
commentStyle.EXCLAMATION.endOfComment=
commentStyle.EXCLAMATION.commentType=LINE_COMMENT

# Double quote line comment - ABAP inline comments, Vim Script
commentStyle.DOUBLE_QUOTE.startOfComment="
commentStyle.DOUBLE_QUOTE.endOfComment=
commentStyle.DOUBLE_QUOTE.commentType=LINE_COMMENT

# Double hash line comment - Nim doc comments, Apache Velocity, Mako
commentStyle.DOUBLE_HASH.startOfComment=##
commentStyle.DOUBLE_HASH.endOfComment=
commentStyle.DOUBLE_HASH.commentType=LINE_COMMENT

# Backslash-asterisk line comment - TLA+
commentStyle.BACKSLASH_ASTERISK.startOfComment=\\*
commentStyle.BACKSLASH_ASTERISK.endOfComment=
commentStyle.BACKSLASH_ASTERISK.commentType=LINE_COMMENT

# Dash-hash line comment - HAML templates
commentStyle.DASH_HASH.startOfComment=-#
commentStyle.DASH_HASH.endOfComment=
commentStyle.DASH_HASH.commentType=LINE_COMMENT

# Double colon line comment - Windows Batch alternative comment syntax
commentStyle.COLON_COLON.startOfComment=::
commentStyle.COLON_COLON.endOfComment=
commentStyle.COLON_COLON.commentType=LINE_COMMENT

# APL lamp character (U+235D) - APL and derivatives (Dyalog APL, J, etc.)
commentStyle.APL_LAMP.startOfComment=\u235d
commentStyle.APL_LAMP.endOfComment=
commentStyle.APL_LAMP.commentType=LINE_COMMENT

# Asterisk-angle - COBOL 2002+ inline comment
commentStyle.ASTERISK_ANGLE.startOfComment=*>
commentStyle.ASTERISK_ANGLE.endOfComment=
commentStyle.ASTERISK_ANGLE.commentType=LINE_COMMENT

# Block Comments
commentStyle.SLASH_ASTERISK.startOfComment=/*
commentStyle.SLASH_ASTERISK.endOfComment=*/
commentStyle.SLASH_ASTERISK.commentType=BLOCK_COMMENT

commentStyle.EQUALS_BEGIN_END.startOfComment==begin
commentStyle.EQUALS_BEGIN_END.endOfComment==end
commentStyle.EQUALS_BEGIN_END.commentType=BLOCK_COMMENT

commentStyle.DOUBLE_DASH_BRACKET.startOfComment=--[[
commentStyle.DOUBLE_DASH_BRACKET.endOfComment=]]
commentStyle.DOUBLE_DASH_BRACKET.commentType=BLOCK_COMMENT

commentStyle.BRACE_DASH.startOfComment={-
commentStyle.BRACE_DASH.endOfComment=-}
commentStyle.BRACE_DASH.commentType=BLOCK_COMMENT

commentStyle.PAREN_ASTERISK.startOfComment=(*
commentStyle.PAREN_ASTERISK.endOfComment=*)
commentStyle.PAREN_ASTERISK.commentType=BLOCK_COMMENT

commentStyle.HASH_EQUALS.startOfComment=#=
commentStyle.HASH_EQUALS.endOfComment==#
commentStyle.HASH_EQUALS.commentType=BLOCK_COMMENT

commentStyle.ANGLE_EXCLAMATION_DASH.startOfComment=<!--
commentStyle.ANGLE_EXCLAMATION_DASH.endOfComment=-->
commentStyle.ANGLE_EXCLAMATION_DASH.commentType=BLOCK_COMMENT

commentStyle.TRIPLE_DOUBLE_QUOTE.startOfComment="""
commentStyle.TRIPLE_DOUBLE_QUOTE.endOfComment="""
commentStyle.TRIPLE_DOUBLE_QUOTE.commentType=BLOCK_COMMENT

commentStyle.TRIPLE_SINGLE_QUOTE.startOfComment='''
commentStyle.TRIPLE_SINGLE_QUOTE.endOfComment='''
commentStyle.TRIPLE_SINGLE_QUOTE.commentType=BLOCK_COMMENT

commentStyle.BRACE_HASH.startOfComment={#
commentStyle.BRACE_HASH.endOfComment=#}
commentStyle.BRACE_HASH.commentType=BLOCK_COMMENT

commentStyle.DOUBLE_BRACE_DASH.startOfComment={{--
commentStyle.DOUBLE_BRACE_DASH.endOfComment=--}}
commentStyle.DOUBLE_BRACE_DASH.commentType=BLOCK_COMMENT

commentStyle.ANGLE_PERCENT_DASH.startOfComment=<%--
commentStyle.ANGLE_PERCENT_DASH.endOfComment=-%>
commentStyle.ANGLE_PERCENT_DASH.commentType=BLOCK_COMMENT

# Curly-brace block comment - Pascal, Delphi, Turbo Pascal
commentStyle.BRACE_CURLY.startOfComment={
commentStyle.BRACE_CURLY.endOfComment=}
commentStyle.BRACE_CURLY.commentType=BLOCK_COMMENT

# Hash-pipe block comment - Racket, Common Lisp, Chicken Scheme
commentStyle.HASH_PIPE.startOfComment=#|
commentStyle.HASH_PIPE.endOfComment=|#
commentStyle.HASH_PIPE.commentType=BLOCK_COMMENT

# Hash-bracket block comment - Nim
commentStyle.HASH_BRACKET.startOfComment=#[
commentStyle.HASH_BRACKET.endOfComment=]#
commentStyle.HASH_BRACKET.commentType=BLOCK_COMMENT

# Percent-brace block comment - MATLAB / GNU Octave
commentStyle.PERCENT_BRACE.startOfComment=%{
commentStyle.PERCENT_BRACE.endOfComment=%}
commentStyle.PERCENT_BRACE.commentType=BLOCK_COMMENT

# PowerShell block comment
commentStyle.POWERSHELL_BLOCK.startOfComment=<#
commentStyle.POWERSHELL_BLOCK.endOfComment=#>
commentStyle.POWERSHELL_BLOCK.commentType=BLOCK_COMMENT

# Slash-plus nested block comment - D language
commentStyle.SLASH_PLUS.startOfComment=/+
commentStyle.SLASH_PLUS.endOfComment=+/
commentStyle.SLASH_PLUS.commentType=BLOCK_COMMENT

# Slash-dash block comment - Lean 4
commentStyle.SLASH_DASH.startOfComment=/-
commentStyle.SLASH_DASH.endOfComment=-/
commentStyle.SLASH_DASH.commentType=BLOCK_COMMENT

# Double-quote block comment - Smalltalk (same delimiter opens and closes)
commentStyle.DOUBLE_QUOTE_BLOCK.startOfComment="
commentStyle.DOUBLE_QUOTE_BLOCK.endOfComment="
commentStyle.DOUBLE_QUOTE_BLOCK.commentType=BLOCK_COMMENT

# Triple-hash block comment - CoffeeScript
commentStyle.TRIPLE_HASH.startOfComment=###
commentStyle.TRIPLE_HASH.endOfComment=###
commentStyle.TRIPLE_HASH.commentType=BLOCK_COMMENT

# Angle-hash-dash block comment - Apache FreeMarker templates
commentStyle.ANGLE_HASH_DASH.startOfComment=<#--
commentStyle.ANGLE_HASH_DASH.endOfComment=-->
commentStyle.ANGLE_HASH_DASH.commentType=BLOCK_COMMENT

# Double-brace-bang-dash block comment - Handlebars templates
commentStyle.DOUBLE_BRACE_BANG_DASH.startOfComment={{!--
commentStyle.DOUBLE_BRACE_BANG_DASH.endOfComment=--}}
commentStyle.DOUBLE_BRACE_BANG_DASH.commentType=BLOCK_COMMENT

# Double-brace-bang comment - Mustache / Handlebars inline comment
commentStyle.DOUBLE_BRACE_BANG.startOfComment={{!
commentStyle.DOUBLE_BRACE_BANG.endOfComment=}}
commentStyle.DOUBLE_BRACE_BANG.commentType=BLOCK_COMMENT

# Hash-asterisk block comment - Apache Velocity
commentStyle.HASH_ASTERISK.startOfComment=#*
commentStyle.HASH_ASTERISK.endOfComment=*#
commentStyle.HASH_ASTERISK.commentType=BLOCK_COMMENT

# Angle-percent-hash block comment - ERB (Embedded Ruby) templates
commentStyle.ANGLE_PERCENT_HASH.startOfComment=<%#
commentStyle.ANGLE_PERCENT_HASH.endOfComment=%>
commentStyle.ANGLE_PERCENT_HASH.commentType=BLOCK_COMMENT

# Brace-asterisk block comment - Smarty PHP templates
commentStyle.BRACE_ASTERISK.startOfComment={*
commentStyle.BRACE_ASTERISK.endOfComment=*}
commentStyle.BRACE_ASTERISK.commentType=BLOCK_COMMENT

# Paren-colon block comment - XQuery
commentStyle.PAREN_COLON.startOfComment=(:
commentStyle.PAREN_COLON.endOfComment=:)
commentStyle.PAREN_COLON.commentType=BLOCK_COMMENT



